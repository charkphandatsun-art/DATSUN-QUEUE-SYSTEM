<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATSUN Queue System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #eef2f7; padding-top: 50px; }
        .container { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #007bff; }
        h1 { color: #007bff; margin-bottom: 10px; }
        .status-label { font-size: 18px; color: #666; }
        .number { font-size: 100px; font-weight: bold; color: #28a745; margin: 20px 0; line-height: 1; }
        .controls { margin-top: 30px; }
        button { font-size: 20px; padding: 15px 30px; cursor: pointer; border: none; border-radius: 10px; margin: 10px; transition: 0.3s; font-weight: bold; }
        .btn-get { background-color: #28a745; color: white; }
        .btn-get:hover { background-color: #218838; }
        .btn-call { background-color: #007bff; color: white; }
        .btn-call:hover { background-color: #0069d9; }
        .queue-info { margin-top: 20px; padding: 10px; background: #f8f9fa; border-radius: 10px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>DATSUN Queue System</h1>
    <div class="status-label">หมายเลขที่กำลังเรียก</div>
    <div class="number" id="current-queue">0</div>
    
    <div class="queue-info">
        คิวที่รออยู่ในระบบ: <span id="queue-list" style="font-weight:bold;">ไม่มี</span>
    </div>

    <div class="controls">
        <button class="btn-get" onclick="takeQueue()">➕ รับคิวใหม่</button>
        <button class="btn-call" onclick="callNext()">📢 เรียกคิวถัดไป</button>
    </div>
</div>

<script>
    let queue = [];
    let lastNumber = 0;

    function takeQueue() {
        lastNumber++;
        queue.push(lastNumber);
        updateDisplay();
        // แจ้งเตือนสั้นๆ ว่ารับคิวแล้ว
        console.log("รับคิวใหม่: " + lastNumber);
    }

    function callNext() {
        if (queue.length > 0) {
            let serving = queue.shift(); // ดึงคิวแรกออกมา
            document.getElementById('current-queue').innerText = serving;
            updateDisplay();
            
            // ระบบเสียงเรียกภาษาไทย
            playVoice(serving);
        } else {
            alert("ขณะนี้ไม่มีคิวรอในระบบครับ");
        }
    }

    function playVoice(num) {
        // ยกเลิกเสียงที่กำลังพูดอยู่ก่อนหน้า (ถ้ามี)
        window.speechSynthesis.cancel();
        
        let msg = new SpeechSynthesisUtterance();
        msg.text = "ขอเชิญหมายเลข " + num + " ค่ะ";
        msg.lang = 'th-TH';
        msg.rate = 0.9; // ปรับให้พูดช้าลงนิดนึงเพื่อให้ฟังชัด
        window.speechSynthesis.speak(msg);
    }

    function updateDisplay() {
        let listElement = document.getElementById('queue-list');
        if (queue.length > 0) {
            listElement.innerText = queue.join(", ");
        } else {
            listElement.innerText = "ไม่มี";
        }
    }
</script>

</body>
</html>
