<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>DATSUN Queue System</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .number { font-size: 80px; font-weight: bold; color: #007bff; margin: 20px 0; }
        button { font-size: 18px; padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; margin: 5px; }
        .btn-get { background-color: #28a745; color: white; }
        .btn-call { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>ระบบจัดการคิว</h1>
    <div class="number" id="current-queue">0</div>
    <p>คิวที่กำลังรอ: <span id="queue-list">ไม่มี</span></p>
    <button class="btn-get" onclick="takeQueue()">กดรับคิว</button>
    <button class="btn-call" onclick="callNext()">เรียกคิวถัดไป</button>
</div>

<script>
    let queue = [];
    let currentNumber = 0;

    function takeQueue() {
        currentNumber++;
        queue.push(currentNumber);
        updateDisplay();
    }

    function callNext() {
        if (queue.length > 0) {
            let serving = queue.shift();
            document.getElementById('current-queue').innerText = serving;
            updateDisplay();
            
            // --- โค้ดเสียงเวอร์ชันแก้ปัญหา ---
            window.speechSynthesis.cancel(); // ล้างคิวเสียงที่ค้างอยู่เก่าๆ ออกก่อน
            
            let msg = new SpeechSynthesisUtterance();
            msg.text = "ขอเชิญหมายเลข " + serving + " ค่ะ";
            msg.lang = 'th-TH';
            msg.volume = 1; // ความดัง 0 ถึง 1
            msg.rate = 0.9;  // ปรับให้ช้าลงนิดนึงเพื่อให้ฟังชัด
            msg.pitch = 1;  // ระดับเสียงสูงต่ำ
            
            // ตรวจสอบว่ามีเสียงในเครื่องไหม
            let voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                // ถ้ายังโหลดเสียงไม่เสร็จ ให้รอแป๊บเดียวแล้วลองใหม่
                window.speechSynthesis.onvoiceschanged = () => {
                    window.speechSynthesis.speak(msg);
                };
            } else {
                window.speechSynthesis.speak(msg);
            }
            // -----------------------------------
            
        } else {
            alert("ขณะนี้ไม่มีคิวรออยู่ครับ");
        }
    
        function updateDisplay() {
        document.getElementById('queue-list').innerText = queue.length > 0 ? queue.join(", ") : "ไม่มี";
    }
</script>

</body>
</html>
